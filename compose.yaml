services:
  database:
    image: mysql ## From https://hub.docker.com/_/mysql/
    restart: unless-stopped
    env_file:
      - db.env
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - backend
    ports:
      - 3306:3306
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u $$MYSQL_USER --password=$$MYSQL_PASSWORD
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
 
 

 ## Website:
 ##   restart: unless-stopped
 ##   networks:
 ##     - frontend
 ##   ports:
 ##     - 8080:8080

 
  api:
    build: ./backend/api
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      # auth:
      #   condition: service_healthy
    ports:
      - 4001:3050
    env_file:
      - api.env
    develop:
      watch:
        - action: rebuild
          path: ./backend/api/
          target: /api
          initial_sync: true
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json
    networks:
      - backend
      - frontend
 
 
  auth:
    build: ./backend/auth
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    ports:
      - 4000:3000
    env_file:
      - auth.env
    develop:
      watch:
        - action: rebuild
          path: ./backend/auth/
          target: /auth
          initial_sync: true
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json
    networks:
      - backend
      - frontend
 

 
networks:
  backend:
    name: backend

  frontend:
    name: frontend